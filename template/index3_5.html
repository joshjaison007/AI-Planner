<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Liquid Planner - Pro Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-thick: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --primary: #8ab4f8;
            --accent: #c58af9;
            --text: #e8eaed;
            --text-dim: #9aa0a6;
            --bg-panel: rgba(0, 0, 0, 0.4);
            --bg-main: #0a0a0c;
            --accent-gradient: radial-gradient(circle at top left, #1a1b2e 0%, #050505 100%);
            --zoom-speed: 0.6s;
        }

        body.light-mode {
            --glass: rgba(0, 0, 0, 0.03);
            --glass-thick: rgba(0, 0, 0, 0.06);
            --glass-border: rgba(0, 0, 0, 0.1);
            --primary: #1a73e8;
            --accent: #7030a0;
            --text: #202124;
            --text-dim: #5f6368;
            --bg-panel: rgba(255, 255, 255, 0.7);
            --bg-main: #f8f9fa;
            --accent-gradient: radial-gradient(circle at top left, #e8f0fe 0%, #ffffff 100%);
        }

        body.theme-emerald { --primary: #81c995; --accent: #34a853; }
        body.theme-sunset { --primary: #f28b82; --accent: #fbbc04; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Google Sans', 'Inter', sans-serif; transition: background 0.3s ease, color 0.3s ease; }
        
        body { 
            background: var(--accent-gradient); 
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            width: 100vw;
        }

        aside {
            width: 320px;
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 50;
            flex-shrink: 0;
        }

        /* Time Button Styling */
        .time-nav-btn {
            background: none;
            border: none;
            text-align: left;
            padding: 10px;
            margin: -10px;
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.2s ease;
            width: fit-content;
        }
        .time-nav-btn:hover {
            background: var(--glass-thick);
        }

        .panel-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        main { 
            flex: 1; 
            position: relative; 
            perspective: 1200px; 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .view-layer {
            position: absolute;
            top: 70px; left: 0; right: 0; bottom: 0;
            transition: transform var(--zoom-speed) cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity var(--zoom-speed) ease, filter var(--zoom-speed) ease;
            transform-origin: center center;
            padding: 30px;
            overflow-y: auto;
        }

        .hidden { pointer-events: none; opacity: 0; filter: blur(20px); }
        .zoom-out { transform: scale(0.7) translateZ(-200px); opacity: 0; filter: blur(10px); }
        .zoom-in { transform: scale(1.4) translateZ(200px); opacity: 0; filter: blur(10px); }

        .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .month-preview { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; cursor: pointer; }
        .month-preview:hover { background: var(--glass-thick); border-color: var(--primary); }
        .mini-grid-dots { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-top: 8px; }
        .dot { width: 4px; height: 4px; background: var(--text-dim); border-radius: 50%; justify-self: center; }
        .dot.has-event { background: var(--accent); transform: scale(1.5); }

        .month-day-names { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin-bottom: 10px; text-align: center; font-size: 11px; font-weight: bold; color: var(--text-dim); text-transform: uppercase; }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; height: auto; }
        .month-day { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px; cursor: pointer; position: relative; min-height: 80px; }
        .month-day:hover { background: var(--glass-thick); border-color: var(--primary); }
        .event-indicator { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-top: 4px; }

        .time-row { display: flex; height: 100px; border-bottom: 1px solid var(--glass-border); align-items: center; }
        .time-label { width: 100px; font-size: 13px; color: var(--primary); font-weight: 500; }
        .time-content { flex: 1; height: 100%; position: relative; }

        .ai-chat-drawer { 
            width: 350px; 
            background: var(--bg-panel); 
            border-left: 1px solid var(--glass-border); 
            backdrop-filter: blur(50px); 
            display: flex; 
            flex-direction: column; 
            z-index: 100; 
            position: relative;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), margin-right 0.4s ease;
            flex-shrink: 0;
        }
        
        .ai-chat-drawer.collapsed { 
            width: 0px; 
            border-left: none; 
            overflow: visible;
        }
        
        .ai-chat-drawer.collapsed .chat-container-inner {
            display: none;
        }

        .collapse-toggle {
            position: absolute; left: -30px; top: 20px;
            width: 30px; height: 60px; background: var(--bg-panel);
            border: 1px solid var(--glass-border); border-right: none;
            border-radius: 15px 0 0 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); z-index: 110;
        }

        .chat-container-inner { width: 350px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 15px; font-size: 14px; max-width: 85%; }
        .msg.ai { background: var(--glass-thick); color: var(--text); align-self: flex-start; }
        .msg.user { background: var(--primary); color: #fff; align-self: flex-end; }

        .chat-input-area { padding: 20px; border-top: 1px solid var(--glass-border); }
        .chat-input-wrapper { background: var(--glass-thick); border: 1px solid var(--glass-border); border-radius: 25px; padding: 10px 15px; display: flex; gap: 10px; }
        #aiInput { flex: 1; background: none; border: none; color: var(--text); outline: none; }
        .send-btn { background: var(--primary); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .settings-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(0px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .settings-overlay.active { display: flex; backdrop-filter: blur(15px); }
        .settings-modal {
            background: var(--bg-panel); border: 1px solid var(--glass-border);
            padding: 35px; border-radius: 30px; width: 420px;
            transform: scale(0.9); opacity: 0; transition: all 0.3s;
        }
        .settings-overlay.active .settings-modal { transform: scale(1); opacity: 1; }

        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border-radius: 12px; background: var(--glass); }
        .btn-pill { background: var(--glass-thick); border: 1px solid var(--glass-border); color: var(--text); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
        #currentTime { font-weight: bold; color: var(--primary); font-size: 20px; }
        #currentDate { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
    </style>
</head>
<body id="appBody">

    <aside>
        <div style="font-size: 24px; font-weight: bold; letter-spacing: -1px; color: var(--primary);">✦ Liquid.ai</div>
        
        <button class="time-nav-btn" onclick="goToToday()">
            <div id="currentTime">10:00 AM</div>
            <div id="currentDate">Saturday, April 11</div>
        </button>
        
        <div class="panel-card">
            <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 12px; font-weight: bold; text-transform: uppercase;">Agenda</div>
            <div id="taskList" style="font-size: 14px; display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; gap: 10px; align-items: center;"><div style="width:8px; height:8px; background:var(--accent); border-radius:50%;"></div> Calendar Ready</div>
            </div>
        </div>
        <button class="btn-pill" onclick="openAI()" style="margin-top: 10px; display: none;" id="openAiBtn">Open AI Assistant</button>
        <button class="btn-pill" onclick="toggleSettings()" style="margin-top: auto;">Settings</button>
    </aside>

    <main id="mainContainer">
        <header>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="backBtn" class="btn-pill" onclick="handleBack()">← Back</button>
                <h2 id="viewTitle" style="font-weight: 500;">2026</h2>
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="width: 10px; height: 10px; background: #ff5f56; border-radius: 50%;"></div>
                <div style="width: 10px; height: 10px; background: #ffbd2e; border-radius: 50%;"></div>
                <div style="width: 10px; height: 10px; background: #27c93f; border-radius: 50%;"></div>
            </div>
        </header>

        <div id="yearLayer" class="view-layer">
            <div class="year-grid" id="yearGrid"></div>
        </div>

        <div id="monthLayer" class="view-layer zoom-in hidden">
            <div class="month-day-names">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div class="month-grid" id="monthGrid"></div>
        </div>

        <div id="dayLayer" class="view-layer zoom-in hidden">
            <div class="day-view" id="dayContent"></div>
        </div>
    </main>

    <div class="ai-chat-drawer" id="aiDrawer">
        <div class="collapse-toggle" onclick="toggleAI()">
            <span id="collapseIcon">›</span>
        </div>
        <div class="chat-container-inner">
            <div style="padding: 20px; border-bottom: 1px solid var(--glass-border); font-weight: bold;">AI Assistant</div>
            <div class="chat-history" id="chatHistory">
                <div class="msg ai">Hey! How can I help you today?.</div>
            </div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" id="aiInput" placeholder="Message AI...">
                    <button class="send-btn" onclick="handleAI()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()">
        <div class="settings-modal" onclick="event.stopPropagation()">
            <h2 style="margin-bottom: 25px; font-weight: 500;">Preferences</h2>
            <div class="setting-row">
                <span>Interface Style</span>
                <button class="btn-pill" onclick="toggleLightMode()" id="modeBtn">Dark Mode</button>
            </div>
            <div class="setting-row">
                <span>Time Format</span>
                <button class="btn-pill" onclick="toggleTimeFormat()" id="timeFormatBtn">12 Hour</button>
            </div>
            <button class="btn-pill" style="width: 100%; margin-top: 15px; padding: 14px; background: var(--primary); color: white; border: none;" onclick="toggleSettings()">Save Changes</button>
        </div>
    </div>

<script>
    let currentLevel = 'year';
    let currentViewMonth = 0;
    let googleEvents = []; 
    let use24Hour = false;
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function updateClock() {
        const now = new Date();
        const options = { hour: '2-digit', minute: '2-digit', hour12: !use24Hour };
        document.getElementById('currentTime').innerText = now.toLocaleTimeString([], options);
        document.getElementById('currentDate').innerText = now.toLocaleDateString([], {weekday: 'long', month: 'long', day: 'numeric'});
    }
    setInterval(updateClock, 1000); updateClock();

    // New Function: Go to Today View
    function goToToday() {
        const today = new Date();
        const monthIndex = today.getMonth();
        const monthName = months[monthIndex];
        const dayNum = today.getDate();

        // 1. Zoom to Month
        zoomIntoMonth(monthName, monthIndex);
        
        // 2. Zoom to Day (with slight delay to allow first transition to start)
        setTimeout(() => {
            zoomIntoDay(dayNum, monthName);
        }, 100);
    }

    function toggleTimeFormat() {
        use24Hour = !use24Hour;
        document.getElementById('timeFormatBtn').innerText = use24Hour ? '24 Hour' : '12 Hour';
        updateClock();
        renderDayGrid();
    }

    function toggleAI() {
        const drawer = document.getElementById('aiDrawer');
        const isCollapsed = drawer.classList.toggle('collapsed');
        const icon = document.getElementById('collapseIcon');
        const openBtn = document.getElementById('openAiBtn');
        icon.innerText = isCollapsed ? '‹' : '›';
        openBtn.style.display = isCollapsed ? 'block' : 'none';
        window.dispatchEvent(new Event('resize'));
    }

    function openAI() {
        const drawer = document.getElementById('aiDrawer');
        if(drawer.classList.contains('collapsed')) toggleAI();
    }

    function toggleSettings() { document.getElementById('settingsOverlay').classList.toggle('active'); }
    function toggleLightMode() {
        const isLight = document.body.classList.toggle('light-mode');
        document.getElementById('modeBtn').innerText = isLight ? 'Light Mode' : 'Dark Mode';
    }

    function getDaysInMonth(month, year) { return new Date(year, month + 1, 0).getDate(); }
    function getFirstDayOfMonth(month, year) { return new Date(year, month, 1).getDay(); }

    let lastEventString = "";
    async function syncWithMCP() {
        try {
            const response = await fetch('http://localhost:8000/api/events');
            const dataText = await response.text();
            
            // Only re-render if the events actually changed to prevent flickering
            if (dataText === lastEventString && googleEvents.length > 0) return;
            lastEventString = dataText;
            
            googleEvents = JSON.parse(dataText);
            renderYear();
            if(currentLevel === 'month') renderMonthGrid(currentViewMonth);
            if(currentLevel === 'day') renderDayEvents();
            updateAgenda();
        } catch(e) { console.warn("Failed to fetch events from server."); }
    }

    function init() {
        renderYear();
        renderDayGrid();
        updateHeader();
        syncWithMCP();
        // Check for new events written to the JSON file every 3 seconds
        setInterval(syncWithMCP, 3000);
    }

    function renderYear() {
        const grid = document.getElementById('yearGrid');
        grid.innerHTML = '';
        const year = 2026;
        months.forEach((m, index) => {
            const card = document.createElement('div');
            card.className = 'month-preview';
            const startDay = getFirstDayOfMonth(index, year);
            const totalDays = getDaysInMonth(index, year);
            let dots = '';
            for(let p=0; p<startDay; p++) dots += '<div class="dot" style="opacity:0"></div>';
            for(let d=1; d<=totalDays; d++) {
                const hasEvent = googleEvents.some(e => {
                    const evtDate = new Date(e.start || e.start_time);
                    return evtDate.getDate() === d && evtDate.getMonth() === index;
                });
                dots += `<div class="dot ${hasEvent ? 'has-event' : ''}"></div>`;
            }
            card.innerHTML = `<div style="font-weight:bold; font-size:14px; margin-bottom:10px;">${m}</div><div class="mini-grid-dots">${dots}</div>`;
            card.onclick = () => zoomIntoMonth(m, index);
            grid.appendChild(card);
        });
    }

    function zoomIntoMonth(monthName, index) {
        currentLevel = 'month';
        currentViewMonth = index;
        updateHeader(monthName);
        renderMonthGrid(index);
        document.getElementById('yearLayer').classList.remove('zoom-in');
        document.getElementById('yearLayer').classList.add('zoom-out');
        document.getElementById('monthLayer').classList.remove('hidden', 'zoom-in', 'zoom-out');
        document.getElementById('dayLayer').classList.add('hidden', 'zoom-in');
    }

    function renderMonthGrid(monthIndex) {
        const grid = document.getElementById('monthGrid');
        grid.innerHTML = '';
        const year = 2026;
        const totalDays = getDaysInMonth(monthIndex, year);
        const startDay = getFirstDayOfMonth(monthIndex, year);
        for(let p=0; p<startDay; p++) grid.appendChild(document.createElement('div')).style.opacity = "0";
        for(let i=1; i<=totalDays; i++) {
            const day = document.createElement('div');
            day.className = 'month-day';
            const hasEvent = googleEvents.some(e => {
                const evtDate = new Date(e.start || e.start_time);
                return evtDate.getDate() === i && evtDate.getMonth() === monthIndex;
            });
            day.innerHTML = `<div style="font-weight:bold; color:var(--primary)">${i}</div>${hasEvent ? '<div class="event-indicator"></div>' : ''}`;
            day.onclick = (e) => { e.stopPropagation(); zoomIntoDay(i, months[monthIndex]); };
            grid.appendChild(day);
        }
    }

    function zoomIntoDay(dayNum, monthName) {
        currentLevel = 'day';
        window.currentViewDay = dayNum;
        updateHeader(`${monthName} ${dayNum}`);
        document.getElementById('monthLayer').classList.add('zoom-out');
        document.getElementById('dayLayer').classList.remove('hidden', 'zoom-in', 'zoom-out');
        renderDayEvents();
    }

    function handleBack() {
        if(currentLevel === 'day') {
            currentLevel = 'month';
            updateHeader(months[currentViewMonth]);
            document.getElementById('dayLayer').classList.add('zoom-in');
            document.getElementById('monthLayer').classList.remove('zoom-out');
            setTimeout(() => document.getElementById('dayLayer').classList.add('hidden'), 600);
        } else if(currentLevel === 'month') {
            currentLevel = 'year';
            updateHeader('2026');
            document.getElementById('monthLayer').classList.add('zoom-in');
            document.getElementById('yearLayer').classList.remove('zoom-out');
            setTimeout(() => document.getElementById('monthLayer').classList.add('hidden'), 600);
        }
    }

    function updateHeader(text) {
        document.getElementById('viewTitle').innerText = text || '2026';
        document.getElementById('backBtn').style.opacity = currentLevel === 'year' ? '0' : '1';
        document.getElementById('backBtn').style.pointerEvents = currentLevel === 'year' ? 'none' : 'all';
    }

    function renderDayGrid() {
        const content = document.getElementById('dayContent');
        content.innerHTML = '';
        for(let i=0; i<24; i++) {
            let label = i + ":00";
            if (!use24Hour) {
                const period = i >= 12 ? 'PM' : 'AM';
                const hour = i % 12 || 12;
                label = `${hour}:00 ${period}`;
            }
            content.innerHTML += `<div class="time-row"><div class="time-label">${label}</div><div class="time-content" id="time-content-${i}"></div></div>`;
        }
    }

    function renderDayEvents() {
        for(let i=0; i<24; i++) {
            const el = document.getElementById(`time-content-${i}`);
            if(el) el.innerHTML = '';
        }
        
        if (!googleEvents) return;
        googleEvents.forEach(e => {
            const d = new Date(e.start || e.start_time);
            if(d.getDate() === window.currentViewDay && d.getMonth() === currentViewMonth) {
                const hr = d.getHours();
                const container = document.getElementById(`time-content-${hr}`);
                if(container) {
                    container.innerHTML += `<div style="background: var(--primary); color: #fff; padding: 6px 12px; border-radius: 6px; margin-top: 5px; font-size: 13px; border-left: 3px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.2);">${e.title}</div>`;
                }
            }
        });
    }

    function updateAgenda() {
        const taskList = document.getElementById('taskList');
        if (!taskList || !googleEvents) return;
        taskList.innerHTML = '';
        googleEvents.forEach(e => {
            const d = new Date(e.start || e.start_time);
            const dateStr = d.toLocaleDateString([], {month: 'short', day: 'numeric'});
            taskList.innerHTML += `<div style="display: flex; gap: 10px; align-items: center;"><div style="width:8px; height:8px; background:var(--accent); border-radius:50%; flex-shrink: 0;"></div> <div>${e.title} <span style="color: var(--text-dim); font-size: 11px;">(${dateStr})</span></div></div>`;
        });
        if(googleEvents.length === 0) {
            taskList.innerHTML = `<div style="color: var(--text-dim); font-size: 13px;">No events scheduled</div>`;
        }
    }

    async function handleAI() {
        const input = document.getElementById('aiInput');
        const history = document.getElementById('chatHistory');
        if (!input.value) return;

        history.innerHTML += `<div class="msg user">${input.value}</div>`;
        const query = input.value;
        input.value = '';

        history.innerHTML += `<div class="msg ai">Command received. Processing calendar data...</div>`;
        history.scrollTop = history.scrollHeight;

        try {
            // CHANGE THIS LINE in index.html inside handleAI():
            const res = await fetch('http://localhost:8000/api/add-event', { // Added http and /api/
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: query })
            });

            // check if flask returned an error
            console.log("Status:", res.status);
            const raw = await res.text();  // read as text first
            console.log("Raw response:", raw);  // see exactly what flask sent back

            const data = JSON.parse(raw);  // then parse it
            history.lastElementChild.innerText = data.message || "Event added!";

        } catch (err) {
            console.log("Error:", err);  // see the actual error
            history.lastElementChild.innerText = "Something went wrong: " + err.message;
        }

        history.scrollTop = history.scrollHeight;
    }

    init();
</script>
<button id="addEventFab" onclick="togglePopup(true)" style="position: fixed; bottom: 30px; right: 380px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); border: none; color: white; font-size: 30px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 99; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;">+</button>

<script src="add-event.js?v=2"></script>

</body>
</html>
